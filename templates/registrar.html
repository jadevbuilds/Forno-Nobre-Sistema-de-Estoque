<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Forno Nobre</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
<div class="register-card mx-3 my-5 shadow-lg" style="overflow: hidden; border-radius: 20px; padding: 0 !important;">
        <div class="text-center py-4" style="background-color: #4b312b; width: 100%; box-shadow: 0 4px 10px rgba(0,0,0,0.3); position: relative; z-index: 1;">
            <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" 
                 style="width: 80px; height: 80px; background-color: rgba(255, 255, 255, 0.15); border: 2px solid #ffffff;">
                <i class="fas fa-user-plus fs-3" style="color: #ffffff;"></i>
            </div>
            <h3 class="fw-bold text-white mb-1">Criar Nova Conta</h3>
            <p class="text-white-50 small mb-0">Preencha os dados para solicitar acesso ao sistema</p>
        </div>

        <div class="p-4">
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="alert alert-warning py-2 small text-center border-0 shadow-sm mb-4" 
                       style="color: #4e342e; background-color: rgba(78, 52, 46, 0.1);">
                       {{ message }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

      <form method="POST" class="text-start">
    <div class="row g-3">
        <div class="col-12">
            <label class="form-label small fw-bold text-muted text-uppercase">Nome de Usuário</label>
            <div class="input-group custom-focus" style="background-color: #f8f9fa; border-radius: 10px; border: 2px solid transparent;">
                <span class="input-group-text bg-transparent border-0">
                    <i class="fas fa-user text-muted small"></i>
                </span>
                <input type="text" name="username" class="form-control border-0 bg-transparent custom-input" placeholder="Como quer ser chamado" required>
            </div>
        </div>

        <div class="col-12">
            <label class="form-label small fw-bold text-muted text-uppercase">E-mail Institucional</label>
            <div class="input-group custom-focus" style="background-color: #f8f9fa; border-radius: 10px; border: 2px solid transparent;">
                <span class="input-group-text bg-transparent border-0">
                    <i class="fas fa-envelope text-muted small"></i>
                </span>
                <input type="email" name="email" class="form-control border-0 bg-transparent custom-input" placeholder="email@fornonobre.com" required>
            </div>
        </div>

        <div class="col-md-6">
            <label class="form-label small fw-bold text-muted text-uppercase">CPF</label>
            <div class="input-group custom-focus" style="background-color: #f8f9fa; border-radius: 10px; border: 2px solid transparent;">
                <span class="input-group-text bg-transparent border-0">
                    <i class="fas fa-id-card text-muted small"></i>
                </span>
                <input type="text" name="cpf" id="cpf" class="form-control border-0 bg-transparent custom-input" placeholder="000.000.000-00" required>
            </div>
        </div>

        <div class="col-md-6">
            <label class="form-label small fw-bold text-muted text-uppercase">Telefone</label>
            <div class="input-group custom-focus" style="background-color: #f8f9fa; border-radius: 10px; border: 2px solid transparent;">
                <span class="input-group-text bg-transparent border-0">
                    <i class="fas fa-phone text-muted small"></i>
                </span>
                <input type="text" name="telefone" id="telefone" class="form-control border-0 bg-transparent custom-input" placeholder="(00) 00000-0000" required>
            </div>
        </div>

        <div class="col-12">
            <label class="form-label small fw-bold text-muted text-uppercase">Data de Nascimento</label>
            <div class="input-group custom-focus" style="background-color: #f8f9fa; border-radius: 10px; border: 2px solid transparent;">
                <span class="input-group-text bg-transparent border-0">
                    <i class="fas fa-calendar-alt text-muted small"></i>
                </span>
                <input type="date" name="data_nascimento" class="form-control border-0 bg-transparent custom-input" required>
            </div>
        </div>

        <div class="col-12">
            <label class="form-label small fw-bold text-muted text-uppercase">Senha de Acesso</label>
            <div class="input-group custom-focus" style="background-color: #f8f9fa; border-radius: 10px; border: 2px solid transparent;">
                <span class="input-group-text bg-transparent border-0">
                    <i class="fas fa-lock text-muted small"></i>
                </span>
                <input type="password" name="senha" id="senha" class="form-control border-0 bg-transparent custom-input" placeholder="Crie uma senha forte" required>
                <span class="input-group-text bg-transparent border-0" style="cursor: pointer;" onclick="toggleSenha()">
                    <i class="fas fa-eye text-muted small" id="toggleIcon"></i>
                </span>
            </div>
        </div>
    </div>

<button type="submit" class="btn btn-nobre w-100 shadow-sm mt-4 py-2 fw-bold">
    FINALIZAR CADASTRO <i class="fas fa-check-circle ms-2"></i>
</button>
    
    <div class="text-center mt-4">
        <p class="small text-muted mb-0">Já possui uma conta? 
            <a href="/login" class="fw-bold text-decoration-none" style="color: #4e342e;">Fazer Login</a>
        </p>
    </div>
</form>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script>
        $(document).ready(function(){
            $('#cpf').mask('000.000.000-00');
            $('#telefone').mask('(00) 00000-0000');
        });
    </script>

    <script>
// Função para o olho da senha no cadastro
function toggleSenha() {
    const inputSenha = document.getElementById('senha');
    const icon = document.getElementById('toggleIcon');
    if (inputSenha.type === 'password') {
        inputSenha.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        inputSenha.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>

</body>
</html>
