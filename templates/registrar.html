<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Forno Nobre</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="auth-page">

<!-- CARD PRINCIPAL -->
<div class="register-card">
    <!-- Container principal do cadastro.
    Ele agrupa todo o formulário e define o visual em formato de "card" -->

    <!-- CABEÇALHO -->
    <div class="text-center py-4" style="background-color: #4b312b;">
        <!-- Parte superior do card (título + descrição) -->

        <div>
            <i class="fas fa-user-plus"></i>
            <!-- Ícone visual usando Font Awesome -->
        </div>

        <h3>Criar Nova Conta</h3>
        <!-- Título principal -->

        <p>Preencha os dados para solicitar acesso ao sistema</p>
        <!-- Texto explicativo -->
    </div>

    <div class="p-4">
        <!-- Corpo do card com espaçamento interno -->

        <!-- MENSAGENS DO FLASK -->
        {% with messages = get_flashed_messages() %}
        <!-- Pega mensagens enviadas pelo backend -->

          {% if messages %}
          <!-- Verifica se existe alguma mensagem -->

            {% for message in messages %}
            <!-- Percorre todas -->

            <div class="alert alert-warning">
                <!-- Caixa de alerta do Bootstrap (amarela) -->
                {{ message }}
                <!-- Mensagem dinâmica do Flask -->
            </div>

            {% endfor %}
          {% endif %}
        {% endwith %}

        <!-- FORMULÁRIO -->
        <form method="POST">
        <!-- method POST envia os dados de forma segura -->

        <!-- GRID DO BOOTSTRAP -->
        <div class="row g-3">
        <!-- row = linha
        g-3 = espaçamento entre colunas -->

            <!-- NOME DE USUÁRIO -->
            <div class="col-12">
                <!-- col-12 = ocupa 100% da largura -->

                <label>Nome de Usuário</label>
                <!-- Label identifica o campo -->

                <div class="input-group">
                    <!-- input-group junta ícone + input -->

                    <span>
                        <i class="fas fa-user"></i>
                    </span>
                    <!-- Ícone visual -->

                    <input type="text" name="username" required>
                    <!-- Campo de texto
                    name="username" → nome enviado ao backend
                    required → impede envio vazio -->
                </div>
            </div>

            <!-- EMAIL -->
            <div class="col-12">
                <label>E-mail Institucional</label>

                <div class="input-group">
                    <span>
                        <i class="fas fa-envelope"></i>
                    </span>

                    <input type="email" name="email" required>
                    <!-- type="email" faz validação automática do formato -->
                </div>
            </div>

            <!-- CPF -->
            <div class="col-md-6">
                <!-- Em telas médias, ocupa metade da linha -->

                <label>CPF</label>

                <div class="input-group">
                    <span>
                        <i class="fas fa-id-card"></i>
                    </span>

                    <input type="text" id="cpf" name="cpf" required>
                    <!-- Campo que será formatado via JavaScript -->
                </div>
            </div>

            <!-- TELEFONE -->
            <div class="col-md-6">
                <label>Telefone</label>

                <div class="input-group">
                    <span>
                        <i class="fas fa-phone"></i>
                    </span>

                    <input type="text" id="telefone" name="telefone" required>
                    <!-- Também será formatado via JS -->
                </div>
            </div>

            <!-- DATA -->
            <div class="col-12">
                <label>Data de Nascimento</label>

                <div class="input-group">
                    <span>
                        <i class="fas fa-calendar-alt"></i>
                    </span>

                    <input type="date" name="data_nascimento" required>
                    <!-- type="date" já abre seletor de data -->
                </div>
            </div>

            <!-- SENHA -->
            <div class="col-12">
                <label>Senha de Acesso</label>

                <div class="input-group">

                    <span>
                        <i class="fas fa-lock"></i>
                    </span>

                    <input type="password" id="senha" name="senha" required>
                    <!-- Campo protegido (oculta caracteres) -->

                    <span onclick="toggleSenha()">
                        <!-- Ao clicar, executa função JS -->

                        <i id="toggleIcon" class="fas fa-eye"></i>
                        <!-- Ícone que será alternado -->
                    </span>
                </div>
            </div>

        </div>

        <!-- BOTÃO -->
        <button type="submit">
            FINALIZAR CADASTRO
        </button>
        <!-- Envia todos os dados do formulário -->

        </form>
    </div>
</div>

<!-- SCRIPTS -->

<!-- jQuery: facilita manipulação do HTML -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Plugin de máscara -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>

<script>

/*
Executa quando a página termina de carregar.
Evita erros ao acessar elementos antes deles existirem.
*/
$(document).ready(function(){

    /*
    Máscara de CPF:
    Formata automaticamente o valor digitado.
    */
    $('#cpf').mask('000.000.000-00');

    /*
    Máscara de telefone:
    Aplica formato padrão brasileiro.
    */
    $('#telefone').mask('(00) 00000-0000');
});

</script>

<script>

/*
Função para mostrar/ocultar senha.
Melhora a experiência do usuário.
*/
function toggleSenha() {

    const inputSenha = document.getElementById('senha');
    const icon = document.getElementById('toggleIcon');

    // Se estiver oculto
    if (inputSenha.type === 'password') {

        inputSenha.type = 'text'; // mostra

        icon.classList.replace('fa-eye', 'fa-eye-slash');

    } else {

        inputSenha.type = 'password'; // esconde

        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}

</script>

</body>
</html>
